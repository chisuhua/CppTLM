# CppTLM CI/CD — GitHub Actions
name: CppTLM CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ============================================================================
  # 构建与测试
  # ============================================================================
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        build-type: [Release, Debug]
        use-systemc: [OFF]  # ON 需要 SystemC 头文件

    name: Build (${{ matrix.build-type }}, SystemC=${{ matrix.use-systemc }})

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build ccache clang-format

    - name: Configure ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-${{ matrix.build-type }}-${{ matrix.use-systemc }}
        max-size: 200M

    - name: Configure CMake
      run: |
        cmake -S . -B build \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
          -DUSE_SYSTEMC=${{ matrix.use-systemc }} \
          -DBUILD_TESTS=ON \
          -DBUILD_EXAMPLES=ON

    - name: Build core library
      run: cmake --build build --target cpptlm_core

    - name: Run tests
      run: |
        if [ -f build/bin/cpptlm_tests ]; then
          ctest --test-dir build --output-on-failure
        else
          echo "No test binary found (Catch2 may not be available offline)"
        fi

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.build-type }}-${{ matrix.use-systemc }}
        path: build/Testing/
        retention-days: 7

  # ============================================================================
  # 代码格式检查
  # ============================================================================
  code-format:
    runs-on: ubuntu-latest

    name: Code Format Check

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install clang-format
      run: sudo apt-get install -y clang-format

    - name: Check code format
      run: |
        if [ -x scripts/format.sh ]; then
          ./scripts/format.sh --check
        else
          echo "format.sh not found, skipping"
        fi
