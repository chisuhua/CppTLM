# CppTLM CI/CD — GitHub Actions
name: CppTLM CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ============================================================================
  # 构建与测试
  # ============================================================================
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        build-type: [Release, Debug]
        use-systemc: [OFF]

    name: Build (${{ matrix.build-type }}, SystemC=${{ matrix.use-systemc }})

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential ccache ninja-build

    - name: Configure ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-${{ matrix.build-type }}-${{ matrix.use-systemc }}
        max-size: 200M

    - name: Configure CMake
      run: |
        cmake -S . -B build \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
          -DUSE_SYSTEMC=${{ matrix.use-systemc }}

    - name: Build
      run: cmake --build build -j$(nproc)

    - name: Run tests
      run: |
        if [ -f build/bin/cpptlm_tests ]; then
          cd build && ctest --output-on-failure -j4
        else
          echo "Test binary not found"
          exit 1
        fi

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ runner.os }}-${{ matrix.build-type }}-${{ matrix.use-systemc }}-${{ github.run_id }}
        path: build/Testing/
        retention-days: 7