# CppTLM CI/CD 工作流
name: CppTLM CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ========== 构建与测试 ==========
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        build-type: [Release, Debug]
        use-systemc: [ON, OFF]
    
    name: Build (${{ matrix.build-type }}, SystemC=${{ matrix.use-systemc }})
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build ccache clang-format
    
    - name: Configure ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-${{ matrix.build-type }}-${{ matrix.use-systemc }}
        max-size: 100M
    
    - name: Configure CMake
      run: |
        cmake -S . -B build \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ matrix.build-type }} \
          -DUSE_SYSTEMC=${{ matrix.use-systemc }} \
          -DBUILD_TESTS=ON \
          -DBUILD_EXAMPLES=ON
    
    - name: Build
      run: cmake --build build --verbose
    
    - name: Run tests
      run: ctest --test-dir build --output-on-failure
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.build-type }}-${{ matrix.use-systemc }}
        path: build/Testing/
        retention-days: 7

  # ========== 代码格式检查 ==========
  code-format:
    runs-on: ubuntu-latest
    
    name: Code Format Check
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install clang-format
      run: sudo apt-get install -y clang-format
    
    - name: Check code format
      run: |
        ./scripts/format.sh --check

  # ========== 构建文档（可选） ==========
  build-docs:
    runs-on: ubuntu-latest
    
    name: Build Documentation
    
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Doxygen
      run: sudo apt-get install -y doxygen graphviz
    
    - name: Build docs
      run: |
        if [ -f "docs/Doxyfile" ]; then
          doxygen docs/Doxyfile
        else
          echo "No Doxyfile found, skipping docs build"
        fi
